services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    env_file: .env
    restart: unless-stopped
    # Port NOT exposed publicly — client container proxies /ws internally
    networks:
      - servercity

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    ports:
      - "8080:80"   # Use 8080 on host to avoid port 80 conflict (IIS, Hyper-V, etc.)
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - servercity

networks:
  servercity:
    driver: bridge
