services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    env_file: .env
    restart: unless-stopped
    # Port NOT exposed publicly — client container proxies /ws internally
    networks:
      - servercity

  client:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - servercity

networks:
  servercity:
    driver: bridge
